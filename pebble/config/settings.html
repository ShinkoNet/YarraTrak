<!DOCTYPE html>
<html>

<head>
    <title>PTV Notify Settings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ff6b00;
        }

        h2 {
            font-size: 16px;
            margin-top: 25px;
            margin-bottom: 12px;
            color: #888;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #aaa;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #2a2a2a;
            color: #fff;
        }

        input:focus {
            outline: none;
            border-color: #ff6b00;
        }

        .hint {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            background: #ff6b00;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:active {
            background: #cc5500;
        }

        .button-config {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .button-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .button-header h3 {
            margin: 0;
            font-size: 15px;
            color: #fff;
        }

        .button-status {
            font-size: 12px;
            color: #888;
        }

        .button-status.configured {
            color: #4a4;
        }

        .search-box {
            display: flex;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
        }

        .search-box button {
            width: auto;
            margin-top: 0;
            padding: 12px 16px;
        }

        .search-results {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .search-result {
            padding: 10px;
            background: #333;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-result:hover {
            background: #444;
        }

        .search-result .name {
            font-size: 14px;
            color: #fff;
        }

        .search-result .type {
            font-size: 12px;
            color: #888;
        }

        .clear-btn {
            background: #444;
            font-size: 12px;
            padding: 6px 12px;
            margin-top: 8px;
        }

        .clear-btn:active {
            background: #555;
        }

        .loading {
            color: #888;
            font-size: 13px;
            padding: 10px;
        }
    </style>
</head>

<body>
    <h1>🚆 PTV Notify</h1>

    <div class="form-group">
        <label for="server_url">Server URL</label>
        <input type="text" id="server_url" placeholder="http://192.168.1.100:8000">
        <div class="hint">Your PTV Notify server address</div>
    </div>

    <h2>Configure Buttons</h2>

    <div class="button-config" id="btn1_config">
        <div class="button-header">
            <h3>Button 1</h3>
            <span class="button-status" id="btn1_status">Not set</span>
        </div>
        <div class="search-box">
            <input type="text" id="btn1_search" placeholder="Search station...">
            <button onclick="searchStop(1)">🔍</button>
        </div>
        <div class="search-results" id="btn1_results"></div>
    </div>

    <div class="button-config" id="btn2_config">
        <div class="button-header">
            <h3>Button 2</h3>
            <span class="button-status" id="btn2_status">Not set</span>
        </div>
        <div class="search-box">
            <input type="text" id="btn2_search" placeholder="Search station...">
            <button onclick="searchStop(2)">🔍</button>
        </div>
        <div class="search-results" id="btn2_results"></div>
    </div>

    <div class="button-config" id="btn3_config">
        <div class="button-header">
            <h3>Button 3</h3>
            <span class="button-status" id="btn3_status">Not set</span>
        </div>
        <div class="search-box">
            <input type="text" id="btn3_search" placeholder="Search station...">
            <button onclick="searchStop(3)">🔍</button>
        </div>
        <div class="search-results" id="btn3_results"></div>
    </div>

    <button id="save">Save Settings</button>

    <script>
        // Get server URL from current page or use default
        var serverBase = window.location.origin;

        function getOptions() {
            try {
                var hash = location.hash.slice(1);
                if (hash) return JSON.parse(decodeURIComponent(hash));
            } catch (e) { }
            return {};
        }

        var options = getOptions();

        // Load existing values
        var serverUrlEl = document.getElementById('server_url');
        if (options.server_url) {
            serverUrlEl.value = options.server_url;
            serverBase = options.server_url;
        }

        // Display configured buttons
        for (var i = 1; i <= 3; i++) {
            updateButtonStatus(i);
        }

        function updateButtonStatus(btnNum) {
            var name = options['btn' + btnNum + '_name'];
            var statusEl = document.getElementById('btn' + btnNum + '_status');
            if (name) {
                statusEl.textContent = name;
                statusEl.classList.add('configured');
            } else {
                statusEl.textContent = 'Not set';
                statusEl.classList.remove('configured');
            }
        }

        async function searchStop(btnNum) {
            var searchEl = document.getElementById('btn' + btnNum + '_search');
            var resultsEl = document.getElementById('btn' + btnNum + '_results');
            var query = searchEl.value.trim();

            if (query.length < 2) {
                resultsEl.innerHTML = '<div class="loading">Enter at least 2 characters</div>';
                return;
            }

            resultsEl.innerHTML = '<div class="loading">Searching...</div>';

            try {
                var base = serverUrlEl.value.trim() || serverBase;
                var res = await fetch(base + '/api/v1/search?q=' + encodeURIComponent(query));
                var data = await res.json();

                if (data.stops && data.stops.length > 0) {
                    resultsEl.innerHTML = data.stops.map(function (stop) {
                        return '<div class="search-result" onclick=\'selectStop(' + btnNum + ',' + JSON.stringify(stop) + ')\'>' +
                            '<span class="name">' + stop.name + '</span>' +
                            '<span class="type">' + stop.type_name + '</span>' +
                            '</div>';
                    }).join('');
                } else {
                    resultsEl.innerHTML = '<div class="loading">No stations found</div>';
                }
            } catch (e) {
                resultsEl.innerHTML = '<div class="loading">Error: ' + e.message + '</div>';
            }
        }

        function selectStop(btnNum, stop) {
            options['btn' + btnNum + '_name'] = stop.name;
            options['btn' + btnNum + '_stop_id'] = stop.stop_id;
            options['btn' + btnNum + '_route_type'] = stop.route_type;
            // Clear direction_id for simplicity (gets all directions)
            delete options['btn' + btnNum + '_direction_id'];

            updateButtonStatus(btnNum);
            document.getElementById('btn' + btnNum + '_results').innerHTML =
                '<div class="loading">✓ Selected: ' + stop.name + '</div>' +
                '<button class="clear-btn" onclick="clearButton(' + btnNum + ')">Clear</button>';
            document.getElementById('btn' + btnNum + '_search').value = '';
        }

        function clearButton(btnNum) {
            delete options['btn' + btnNum + '_name'];
            delete options['btn' + btnNum + '_stop_id'];
            delete options['btn' + btnNum + '_route_type'];
            delete options['btn' + btnNum + '_direction_id'];
            updateButtonStatus(btnNum);
            document.getElementById('btn' + btnNum + '_results').innerHTML = '';
        }

        // Handle Enter key in search boxes
        for (var i = 1; i <= 3; i++) {
            (function (btnNum) {
                document.getElementById('btn' + btnNum + '_search').addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') searchStop(btnNum);
                });
            })(i);
        }

        document.getElementById('save').addEventListener('click', function () {
            var serverUrl = serverUrlEl.value.trim();

            if (!serverUrl) {
                alert('Please enter a server URL');
                return;
            }

            options.server_url = serverUrl;
            location.href = 'pebblejs://close#' + encodeURIComponent(JSON.stringify(options));
        });
    </script>
</body>

</html>
